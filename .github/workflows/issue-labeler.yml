name: Issue Labeler

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: read

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect labels from issue body
        id: detect
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799c31a # v7.0.1
        with:
          script: |
            const body = context.payload.issue.body || '';
            const labels = [];
            if (/modme-[a-z0-9]+/i.test(body)) labels.push('beads-linked');
            if (/self[_\s-]?heal[:\s]*yes/i.test(body)) labels.push('devops-autofix');
            if (/\bstack:\s*forge\b/i.test(body) || /stack:forge/i.test(body)) labels.push('stack:forge');
            if (/\bstack:\s*generative\b/i.test(body) || /stack:generative/i.test(body)) labels.push('stack:generative');
            if (/\bstack:\s*orchestration\b/i.test(body) || /stack:orchestration/i.test(body)) labels.push('stack:orchestration');
            if (/\bstack:\s*root\b/i.test(body) || /stack:root/i.test(body)) labels.push('stack:root');
            if (/CI\/CD|pipeline failure|verify:forge|verify:generative/i.test(body)) labels.push('ci-cd');
            core.setOutput('labels', JSON.stringify(labels));

      - name: Apply labels
        if: steps.detect.outputs.labels != '[]'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799c31a # v7.0.1
        with:
          script: |
            const labels = JSON.parse('${{ steps.detect.outputs.labels }}');
            if (labels.length === 0) return;
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels,
            });
