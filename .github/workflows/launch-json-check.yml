name: Launch config check

on:
  pull_request:
    paths:
      - ".vscode/launch.json"
      - ".vscode/tasks.json"
      - "scripts/launch-manifest.json"
      - "scripts/validate-launch-json.mjs"
      - ".github/workflows/launch-json-check.yml"
  push:
    branches: [main, master]
    paths:
      - ".vscode/launch.json"
      - ".vscode/tasks.json"
      - "scripts/launch-manifest.json"
      - "scripts/validate-launch-json.mjs"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build agent-generator (dist targets used by launch.json)
        working-directory: GenerativeUI_monorepo/apps/agent-generator
        run: |
          corepack enable
          yarn install --immutable 2>/dev/null || yarn install
          yarn build

      - name: Validate launch.json structure and paths
        run: node scripts/validate-launch-json.mjs

      - name: Enforce manifest sync for debug targets
        run: node scripts/validate-launch-json.mjs --require-manifest-sync
