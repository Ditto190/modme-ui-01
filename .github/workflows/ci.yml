name: CI

# Stack jobs below mirror preflight manifest steps; unified manifest gate: preflight-ci.yml

on:
  push:
    branches:
      - main
      - master
      - develop
      - dev
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches:
      - main
      - master
      - develop
      - dev
    paths-ignore:
      - "docs/**"
      - "LICENSE"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block tracked env files
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)\.env$|\.env\.local$|\.env\.prod$' ; then
            echo "::err::Secret env files must not be committed. Remove from git and add to .gitignore."
            exit 1
          fi
          echo "No .env files tracked."

  changes:
    runs-on: ubuntu-latest
    outputs:
      forge: ${{ steps.filter.outputs.forge }}
      generative: ${{ steps.filter.outputs.generative }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            forge:
              - 'next-forge/**'
            generative:
              - 'GenerativeUI_monorepo/**'

  changelog:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate CHANGELOG
        run: node scripts/validate-changelog.mjs
      - name: Require CHANGELOG update when needed
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/validate-changelog.mjs --require-update

  generative-ui:
    needs: [secret-guard, changes]
    if: needs.changes.outputs.generative == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GenerativeUI_monorepo
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: GenerativeUI_monorepo/yarn.lock
      - name: Enable Corepack (Yarn 3)
        run: corepack enable
      - name: Restore Turbo local cache
        uses: actions/cache@v4
        with:
          path: GenerativeUI_monorepo/.turbo
          key: turbo-generative-${{ runner.os }}-${{ hashFiles('GenerativeUI_monorepo/yarn.lock') }}-${{ github.sha }}
          restore-keys: |
            turbo-generative-${{ runner.os }}-${{ hashFiles('GenerativeUI_monorepo/yarn.lock') }}-
            turbo-generative-${{ runner.os }}-
      - name: Install deps
        run: yarn install --immutable 2>/dev/null || yarn install
      - name: Lint
        run: yarn lint
      - name: Test
        run: yarn test
      - name: Build
        run: yarn build:product

  next-forge:
    needs: [secret-guard, changes]
    if: needs.changes.outputs.forge == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: next-forge
    env:
      # Remote cache: gate on repo variable TURBO_REMOTE_CACHE_ENABLED=true (not next-forge/.env).
      # See docs/monorepo-build-ci-setup.md and docs/turbo-remote-cache-s3.md
      TURBO_API: ${{ vars.TURBO_API }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Restore Turbo local cache
        if: vars.TURBO_REMOTE_CACHE_ENABLED != 'true'
        uses: actions/cache@v4
        with:
          path: next-forge/.turbo
          key: turbo-forge-${{ runner.os }}-${{ hashFiles('next-forge/turbo.json', 'next-forge/bun.lock') }}-${{ github.sha }}
          restore-keys: |
            turbo-forge-${{ runner.os }}-${{ hashFiles('next-forge/turbo.json', 'next-forge/bun.lock') }}-
            turbo-forge-${{ runner.os }}-
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: next-forge/package.json
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Check (Ultracite/Biome)
        run: bun run check
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build
