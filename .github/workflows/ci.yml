name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - dev
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches:
      - main
      - master
      - develop
      - dev
    paths-ignore:
      - "docs/**"
      - "LICENSE"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block tracked env files
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)\.env$|\.env\.local$|\.env\.prod$' ; then
            echo "::err::Secret env files must not be committed. Remove from git and add to .gitignore."
            exit 1
          fi
          echo "No .env files tracked."

  changes:
    runs-on: ubuntu-latest
    outputs:
      forge: ${{ steps.filter.outputs.forge }}
      generative: ${{ steps.filter.outputs.generative }}
      harness: ${{ steps.filter.outputs.harness }}
      e2e: ${{ steps.filter.outputs.e2e }}
      moleculeContract: ${{ steps.filter.outputs.moleculeContract }}
    steps:
      - uses: actions/checkout@v4
      # Path globs must stay in sync with scripts/lib/stack-paths.json (validated by validate-stack-paths-ci-sync.mjs)
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            forge:
              - 'next-forge/**'
            generative:
              - 'GenerativeUI_monorepo/**'
            rootLegacy:
              - 'src/**'
              - 'agent/**'
            orchestration:
              - 'scripts/**'
              - 'docs/**'
              - '.cursor/**'
              - '.agents/**'
              - '.github/**'
              - 'harness/**'
              - 'package.json'
              - 'CHANGELOG.md'
              - 'e2e/worktree-smoke/**'
              - '.githooks/**'
            harness:
              - 'harness/**'
              - 'docs/ECL.md'
              - 'docs/STATUS.md'
              - 'docs/ARCHITECTURE.md'
              - 'C4-Documentation/**'
            e2e:
              - 'next-forge/tests/e2e/**'
              - 'next-forge/playwright.config.ts'
              - 'next-forge/packages/schemas/ws-contract.test.ts'
              - 'next-forge/packages/schemas/molecule-index.test.ts'
              - 'scripts/molecule-index-orchestrator.mjs'
              - 'scripts/__tests__/molecule-index.test.mjs'
              - 'data/molecule-index/**'
            moleculeContract:
              - 'next-forge/packages/schemas/**'
              - 'packages/intake-contracts/**'
              - 'scripts/molecule-index*.mjs'
              - 'scripts/__tests__/molecule-index.test.mjs'
              - 'data/molecule-index/**'

  changelog:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate CHANGELOG
        run: node scripts/validate-changelog.mjs
      - name: Require CHANGELOG update when needed
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha }}
        run: node scripts/validate-changelog.mjs --require-update

  generative-ui:
    needs: [secret-guard, changes]
    if: needs.changes.outputs.generative == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GenerativeUI_monorepo
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: GenerativeUI_monorepo/yarn.lock
      - name: Enable Corepack (Yarn 3)
        run: corepack enable
      - name: Install deps
        run: yarn install --immutable 2>/dev/null || yarn install
      - name: Lint
        run: yarn lint
      - name: Test
        run: yarn test
      - name: Build
        run: yarn build:product

  next-forge:
    needs: [secret-guard, changes]
    if: needs.changes.outputs.forge == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: next-forge
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: next-forge/package.json
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Check (Ultracite/Biome)
        run: bun run check
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build

  harness-lint:
    needs: [secret-guard, changes]
    if: needs.changes.outputs.harness == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Lint ECL harness
        run: |
          node scripts/lint-ecl.mjs
          node scripts/lint-encoding.mjs
          node scripts/lib/validate-stack-paths-ci-sync.mjs

  e2e-smoke:
    needs: [secret-guard, changes]
    if: needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: next-forge
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: next-forge/package.json
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps
      - name: Schema + WS contract tests
        run: bun test packages/schemas/ws-contract.test.ts packages/schemas/observability.test.ts
      - name: Playwright smoke (skipped without agent-server)
        run: |
          echo "e2e-smoke: Playwright requires agent-server on :8000 — run locally with full stack"
          echo "See next-forge/tests/e2e/generative-ui.spec.ts"

  molecule-contract:
    needs: [secret-guard, changes]
    if: needs.changes.outputs.moleculeContract == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: next-forge/package.json
      - name: Generate molecule manifest
        run: node scripts/molecule-index-orchestrator.mjs --stack forge --semver 1.0.0
      - name: Molecule contract tests
        run: yarn molecule-index:verify
      - name: WS schema contract tests
        working-directory: next-forge
        run: |
          bun install --frozen-lockfile
          bun test packages/schemas/ws-contract.test.ts
