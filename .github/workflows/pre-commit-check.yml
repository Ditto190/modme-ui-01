name: Pre-commit checks

on:
  pull_request:
    branches: [main, master, develop, dev, chore/**]
  push:
    branches: [main, master, develop, dev, chore/**]

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: next-forge/package.json

      - name: Install GenerativeUI deps (for CI suite)
        run: |
          corepack enable
          cd GenerativeUI_monorepo && yarn install --immutable 2>/dev/null || yarn install

      - name: Run pre-commit checks
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node scripts/pre-commit-checks.mjs --ci

      - name: Upload preflight report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-report-pre-commit
          path: docs/devops/reports/preflight-latest.json
          retention-days: 14
          if-no-files-found: warn
