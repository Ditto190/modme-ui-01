name: Catalog CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install dependencies
      run: bun install

    - name: Generate Prisma Client
      run: bunx prisma generate
      working-directory: next-forge/packages/database

    - name: Run Linters
      run: bun run lint

    - name: Run Unit Tests
      run: bun run test

    - name: Run Functional Tests (Quality Playbook)
      run: bun run test:functional || echo "Tests need to be written"

    - name: Validate Prisma Migrations
      run: bunx prisma migrate diff --from-empty --to-schema-datamodel prisma/schema.prisma --script > check.sql && echo "Prisma schema is valid"
      working-directory: next-forge/packages/database

    - name: Validate Supabase Migrations
      run: bunx supabase db lint
      working-directory: next-forge/packages/database

  deploy-staging:
    needs: build-and-test
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Staging
        run: echo "Deploying to Staging Environment"

  deploy-production:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Production
        run: echo "Deploying to Production Environment"
