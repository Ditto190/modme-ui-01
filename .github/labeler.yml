# ModMe dual-monorepo — PR auto-labeler
# Stack + workflow labels; see .cursor/bugbot/AUTOTAGS.yml

stack:forge:
  - "next-forge/**"

stack:generative:
  - "GenerativeUI_monorepo/**"

stack:orchestration:
  - "scripts/**"
  - "docs/**"
  - ".cursor/**"
  - ".agents/**"
  - ".github/**"
  - "package.json"
  - "CHANGELOG.md"
  - "mprocs.yaml"
  - "data/agent-citizens/**"

ci-cd:
  - ".github/workflows/**"
  - ".github/actions/**"
  - ".gitlab/**"
  - ".gitlab-ci.yml"
  - "GenerativeUI_monorepo/.gitlab-ci.yml"
  - ".githooks/**"
  - "scripts/pre-push-checks.mjs"
  - "scripts/lib/run-verify-stack.mjs"

documentation:
  - "**/*.md"
  - "docs/**"
  - "README.md"
  - "AGENTS.md"

testing:
  - "**/*.test.{ts,tsx,js,jsx,mjs}"
  - "**/*.spec.{ts,tsx,js,jsx,py}"
  - "scripts/__tests__/**"
  - "e2e/**"

security:
  - ".github/workflows/*security*"
  - "**/SECURITY.md"

developer-experience:
  - ".vscode/**"
  - ".cursor/**"
  - "scripts/cursor-ai/**"

# Legacy GenUI paths (retain for open PRs touching old layout)
agent:
  - "agent/**/*.py"
  - "agent/main.py"

frontend:
  - "src/**/*.tsx"
  - "src/**/*.ts"
  - "src/app/**/*"

toolset:
  - "agent/toolsets.json"
  - "scripts/toolset-management/**/*"
  - "docs/TOOLSET_MANAGEMENT.md"
