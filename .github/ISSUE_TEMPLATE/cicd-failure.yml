name: "CI/CD Failure"
description: "Automatically filed when a workflow or preflight check fails during CI/CD"
title: "[CI/CD Failure]: "
labels: ["ci-cd", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### Automated CI/CD Failure Report
        This issue was automatically generated due to a pipeline or pre-commit hook failure.
  - type: dropdown
    id: stack
    attributes:
      label: Stack
      description: Which monorepo area failed?
      options:
        - "stack:forge"
        - "stack:generative"
        - "stack:orchestration"
        - "stack:root"
    validations:
      required: true
  - type: input
    id: pipeline
    attributes:
      label: "Pipeline Name"
      placeholder: "e.g. CI Parity Check / verify:forge"
    validations:
      required: true
  - type: input
    id: step
    attributes:
      label: "Failing Step / Job"
      placeholder: "e.g. build:app"
    validations:
      required: true
  - type: textarea
    id: error-log
    attributes:
      label: "Error Log Excerpt"
      description: "Paste the relevant error logs/messages here"
      placeholder: "yarn build failed with exit code 1..."
    validations:
      required: true
  - type: dropdown
    id: self-heal
    attributes:
      label: "Trigger autonomous DevOps agent?"
      description: "If Yes, routes to devops-ci-champion (max 2 fix rounds)"
      options:
        - "Yes"
        - "No"
      default: 0
    validations:
      required: true
  - type: input
    id: beads_issue_id
    attributes:
      label: Beads issue ID (optional)
      placeholder: "modme-aqu"
  - type: input
    id: file-path
    attributes:
      label: "Target File Path (Optional)"
      description: "Specify the file path if known"
      placeholder: "next-forge/packages/schemas/index.ts"
  - type: input
    id: test-path
    attributes:
      label: "Test File Path (Optional)"
      description: "Specify the test file path if known"
      placeholder: "next-forge/packages/schemas/index.test.ts"
