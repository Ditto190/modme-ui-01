# GitLab CI for GenerativeUI_monorepo — mirrors root .github/workflows/ci.yml generative-ui job
# Canonical CI: GitHub Actions at repo root. GitLab is an active mirror.

stages:
  - install
  - test

default:
  image: node:20-bookworm
  before_script:
    - corepack enable
    - node --version
    - yarn --version

variables:
  YARN_ENABLE_GLOBAL_CACHE: "false"
  FF_USE_FASTZIP: "true"

.yarn_cache: &yarn_cache
  cache:
    key:
      files:
        - yarn.lock
    paths:
      - .yarn/cache
    policy: pull-push

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

install:
  stage: install
  <<: *yarn_cache
  script:
    - yarn install --immutable
  artifacts:
    paths:
      - .yarn/
      - .pnp.cjs
      - .pnp.loader.mjs
    expire_in: 1 hour

lint:
  stage: test
  <<: *yarn_cache
  needs: [install]
  script:
    - yarn install --immutable
    - yarn lint

test:
  stage: test
  <<: *yarn_cache
  needs: [install]
  script:
    - yarn install --immutable
    - yarn test

build:
  stage: test
  <<: *yarn_cache
  needs: [install]
  script:
    - yarn install --immutable
    - yarn build
