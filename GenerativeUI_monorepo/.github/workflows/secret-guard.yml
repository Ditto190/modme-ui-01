name: Secret guard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  block-env-files:
    name: Block committed .env files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail if .env secrets are tracked
        shell: bash
        run: |
          set -euo pipefail
          tracked="$(git ls-files | grep -E '(^|/)\.env(\.|$|rc)' | grep -Ev '\.example$|\.sample$|\.template$' || true)"
          if [ -n "$tracked" ]; then
            echo "::error::Tracked env/secret files must not be committed:"
            echo "$tracked"
            exit 1
          fi
          echo "No tracked .env files (examples/templates allowed)."
