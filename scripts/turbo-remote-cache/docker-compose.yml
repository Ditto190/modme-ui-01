# Self-hosted Turborepo remote cache.
# Docs: ../../docs/turbo-remote-cache-s3.md
#
# Local dev (no S3): STORAGE_PROVIDER=local in .env
#   yarn setup:turbo-cache -ApplyLocalEnv -StartDocker -CheckServer
#
# Production S3: STORAGE_PROVIDER=s3 + S3_ACCESS_KEY / S3_SECRET_KEY

services:
  turbo-cache:
    image: ducktors/turborepo-remote-cache:latest
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:3000"
    volumes:
      - turbo-cache-data:/mnt/cache
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      AUTH_MODE: static
      TURBO_TOKEN: ${TURBO_TOKEN}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      STORAGE_PATH: ${STORAGE_PATH:-/mnt/cache}
      STORAGE_PATH_USE_TMP_FOLDER: ${STORAGE_PATH_USE_TMP_FOLDER:-false}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${TURBO_REMOTE_CACHE_SIGNATURE_KEY}
      BODY_LIMIT: "104857600"
      LOG_LEVEL: info
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://localhost:3000/v8/artifacts/status",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  turbo-cache-data:
