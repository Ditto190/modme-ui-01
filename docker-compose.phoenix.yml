services:
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix-server
    ports:
      - "6006:6006" # Phoenix UI
      - "4317:4317" # OTLP gRPC collector
    environment:
      - PHOENIX_PORT=6006
      - PHOENIX_GRPC_PORT=4317
      - PHOENIX_SQL_DATABASE_URL=sqlite:////data/phoenix.db
      # Optional: Use PostgreSQL instead
      # - PHOENIX_SQL_DATABASE_URL=postgresql://user:password@postgres:5432/phoenix
    volumes:
      - phoenix-data:/data
    restart: unless-stopped
    networks:
      - observability
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:6006').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  copilot-proxy:
    build:
      context: .
      dockerfile: Dockerfile.copilot-proxy
    container_name: copilot-telemetry-proxy
    ports:
      - "8080:8080" # Telemetry endpoint
    environment:
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006/v1/traces
      - PHOENIX_PROJECT_NAME=copilot-research
      - PROXY_PORT=8080
      - PROXY_HOST=0.0.0.0
      - LOG_LEVEL=INFO
    depends_on:
      phoenix:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - observability
    volumes:
      - ./agent:/app/agent:ro
      - ./datasets:/app/datasets

  # Optional: PostgreSQL for production use
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: phoenix-postgres
  #   environment:
  #     - POSTGRES_USER=phoenix
  #     - POSTGRES_PASSWORD=phoenix_password
  #     - POSTGRES_DB=phoenix
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - observability

volumes:
  phoenix-data:
    driver: local
  # postgres-data:
  #   driver: local

networks:
  observability:
    driver: bridge
